<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCI – Inventário</title>
    <link rel="shortcut icon" href="./img/CDC-ESTOQUE.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
      body {
        background-color: #f2f6ff;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
      }
      .card {
        border: none;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
      .table-fixed {
        max-height: 520px;
        overflow: auto;
      }
      .img-thumbnail {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 10px;
      }
      .alert-stock {
        background-color: #ffebee !important;
        color: #c62828;
        font-weight: 600;
      }
      .alert-stock td:first-child::before {
        content: "COMPRAR ";
        color: #d32f2f;
        font-weight: bold;
      }
      .preview-img {
        max-width: 280px;
        max-height: 280px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <nav id="navbar" class="navbar navbar-dark d-none">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold"><i class="fas fa-warehouse"></i> Inventário</span>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white fw-semibold">
            Bem-vindo, <strong id="userName">Usuário</strong>
          </span>
          <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt"></i> Sair
          </button>
        </div>
      </div>
    </nav>

    <div id="loginScreen" class="container d-flex align-items-center justify-content-center min-vh-100">
      <div class="card shadow-lg" style="width: 100%; max-width: 440px">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fa-solid fa-boxes-stacked fa-4x text-primary mb-3"></i>
            <h2 class="fw-bold">Inventário</h2>
            <p class="text-muted">Verifique saldos e gere relatório.</p>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Login</label>
              <input type="text" id="loginInput" class="form-control form-control-lg" placeholder="Informe o login" required />
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input type="password" id="senhaInput" class="form-control form-control-lg" placeholder="Informe a senha" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Entrar no Sistema</button>
          </form>
          <div class="text-center mt-4 text-muted small">
            <strong>Teste:</strong> login <code>inventario</code> • senha <code>inv123</code>
          </div>
        </div>
      </div>
    </div>

    <div id="mainScreen" class="d-none container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold text-primary mb-1">Inventário</h2>
          <p class="text-muted mb-0">Saldos calculados automaticamente.</p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary" onclick="renderInventory()">
            <i class="fas fa-sync-alt me-2"></i> Atualizar
          </button>
          <button class="btn btn-primary" onclick="gerarPDF()">
            <i class="fas fa-file-pdf me-2"></i> Exportar PDF
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="p-3">
            <input id="inventorySearch" class="form-control" placeholder="Buscar produto..." />
          </div>
          <div class="table-fixed">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Código</th>
                  <th>Nome do Produto</th>
                  <th>Entrada</th>
                  <th>Saída</th>
                  <th>Saldo</th>
                  <th>Imagem</th>
                </tr>
              </thead>
              <tbody id="inventoryTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL DETALHES DA ENTRADA (substitui o anterior) -->
    <div class="modal fade" id="entradaModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Detalhes da Entrada</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-2">
                  <label class="form-label">Código</label>
                  <input id="entradaModalCodigo" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">Nome do Produto</label>
                  <input id="entradaModalNome" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">Ativo</label>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="entradaModalAtivo" disabled />
                    <label class="form-check-label" for="entradaModalAtivo">Ativo</label>
                  </div>
                </div>
                <div class="mb-2">
                  <label class="form-label">Empresa</label>
                  <input id="entradaModalEmpresa" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">Quantidade</label>
                  <input id="entradaModalQt" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">Data Chegada</label>
                  <input id="entradaModalDataChegada" class="form-control" disabled />
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-2">
                  <label class="form-label">PO</label>
                  <input id="entradaModalPo" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">RI</label>
                  <input id="entradaModalRi" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">PY</label>
                  <input id="entradaModalPy" class="form-control" disabled />
                </div>
                <div class="mb-2">
                  <label class="form-label">Data Registro</label>
                  <input id="entradaModalDataHora" class="form-control" disabled />
                </div>
              </div>
            </div>
            <div class="mt-3 text-center">
              <img id="entradaModalImage" class="preview-img border" src="https://via.placeholder.com/280x280?text=Sem+Imagem" alt="Imagem" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="acesso.js"></script>
    <script type="module">
      import { DB } from './bd.js';

      let inventoryItems = [];

      async function renderInventory() {
        const table = document.getElementById('inventoryTable');
        table.innerHTML = '';

        const filter = String(document.getElementById('inventorySearch')?.value || '').trim().toLowerCase();

        // Obtém todos os movimentos e agrupa por código
        const movements = await DB.getInventory(); // supondo que retorna array de movimentações

        // Agrupamento por código (evita duplicatas)
        const grouped = {};
        movements.forEach(mov => {
          const cod = String(mov.codigo || '').trim();
          if (!cod) return;

          if (!grouped[cod]) {
            grouped[cod] = {
              codigo: cod,
              nome: mov.nome || '—',
              imagem: mov.imagem || 'https://via.placeholder.com/70x70?text=N/D',
              ativo: mov.ativo === true || mov.ativo === 'true' || false,
              entrada: 0,
              saida: 0,
              saldo: 0
            };
          }

          const item = grouped[cod];

          // Acumula entrada e saída
          if (mov.tipo === 'entrada' || mov.movimento === 'entrada') {
            item.entrada += Number(mov.quantidade || 0);
          } else if (mov.tipo === 'saida' || mov.movimento === 'saída' || mov.movimento === 'saida') {
            item.saida += Number(mov.quantidade || 0);
          }

          item.saldo = item.entrada - item.saida;
        });

        inventoryItems = Object.values(grouped);

        let items = inventoryItems;
        if (filter) {
          items = items.filter(item => String(item.nome || '').toLowerCase().includes(filter));
        }

        if (!items.length) {
          table.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Nenhum produto encontrado.</td></tr>';
          return;
        }

        items.forEach(item => {
          const isLowStock = !item.ativo || item.saldo <= 0;
          const rowClass = isLowStock ? 'alert-stock' : '';

          const tr = document.createElement('tr');
          tr.className = rowClass;
          tr.innerHTML = `
            <td>${item.codigo}</td>
            <td>${item.nome}</td>
            <td>${item.entrada}</td>
            <td>${item.saida}</td>
            <td>${item.saldo}</td>
            <td>
              <img src="${item.imagem}" class="img-thumbnail" alt="Produto" />
            </td>
          `;
          tr.style.cursor = 'pointer';
          tr.addEventListener('click', () => openEntradaModal(item));
          table.appendChild(tr);
        });
      }

      function openEntradaModal(item) {
        // Preenche apenas os campos que temos (os demais ficam vazios ou com —)
        document.getElementById('entradaModalCodigo').value = item.codigo || '—';
        document.getElementById('entradaModalNome').value = item.nome || '—';
        document.getElementById('entradaModalAtivo').checked = !!item.ativo;
        document.getElementById('entradaModalQt').value = (item.entrada - item.saida) || '0';
        // Os demais campos (Empresa, PO, RI, PY, datas...) ficam vazios se não existirem no objeto
        document.getElementById('entradaModalEmpresa').value = item.empresa || '—';
        document.getElementById('entradaModalPo').value = item.po || '—';
        document.getElementById('entradaModalRi').value = item.ri || '—';
        document.getElementById('entradaModalPy').value = item.py || '—';
        document.getElementById('entradaModalDataChegada').value = item.dataChegada || '—';
        document.getElementById('entradaModalDataHora').value = item.dataRegistro || '—';

        document.getElementById('entradaModalImage').src = item.imagem || 'https://via.placeholder.com/280x280?text=Sem+Imagem';

        new bootstrap.Modal(document.getElementById('entradaModal')).show();
      }

      document.getElementById('inventorySearch').addEventListener('input', renderInventory);

      window.renderInventory = renderInventory;

      async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const items = inventoryItems; // usa o que já foi agrupado

        doc.setFontSize(18);
        doc.text('Relatório de Inventário', 20, 20);
        doc.setFontSize(10);
        doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 20, 28);

        const columns = ['Código', 'Produto', 'Entrada', 'Saída', 'Saldo', 'Status'];
        const body = items.map(item => [
          item.codigo,
          item.nome,
          item.entrada,
          item.saida,
          item.saldo,
          (!item.ativo || item.saldo <= 0) ? 'COMPRAR URGENTE' : 'OK'
        ]);

        doc.autoTable({
          startY: 35,
          head: [columns],
          body,
          theme: 'grid',
          styles: { fontSize: 9, cellPadding: 3 },
          headStyles: { fillColor: [13, 110, 253] },
          margin: { left: 15, right: 15 },
        });

        doc.save(`inventario_${new Date().toISOString().slice(0, 10)}.pdf`);
      }

      window.gerarPDF = gerarPDF;

      window.addEventListener('load', () => {
        access.initAccess({
          mainScreenId: 'mainScreen',
          navbarId: 'navbar',
          userNameId: 'userName',
          userDisplayName: 'Usuário',
          validLogin: 'inventario',
          validSenha: 'inv123',
          onLogin: renderInventory,
        });

        if (access.isLoggedIn()) {
          renderInventory();
        }
      });
    </script>
  </body>
</html>
