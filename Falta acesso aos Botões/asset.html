<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCI - Asset</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
      body {
        background-color: #f8f9fa;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
      }
      .card {
        border: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .preview-img {
        max-width: 240px;
        max-height: 240px;
        object-fit: cover;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav id="navbar" class="navbar navbar-dark d-none">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold"
          ><i class="fas fa-boxes"></i> Asset</span
        >
        <div>
          <span class="text-white me-3">
            Bem-vindo, <strong id="userName">Usuário</strong>
          </span>
          <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt"></i> Sair
          </button>
        </div>
      </div>
    </nav>

    <!-- LOGIN -->
    <div
      id="loginScreen"
      class="container d-flex align-items-center justify-content-center min-vh-100"
    >
      <div class="card shadow-lg" style="width: 100%; max-width: 420px">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fa-solid fa-boxes-stacked fa-4x text-info mb-3"></i>
            <h2 class="fw-bold">Asset</h2>
            <p class="text-muted">Cadastro e geração de relatório</p>
          </div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Login</label>
              <input
                type="text"
                id="loginInput"
                class="form-control form-control-lg"
                placeholder="Informe o login"
                required
              />
            </div>
            <div class="mb-4">
              <label class="form-label">Senha</label>
              <input
                type="password"
                id="senhaInput"
                class="form-control form-control-lg"
                placeholder="Informe a senha"
                required
              />
            </div>
            <button type="submit" class="btn btn-info btn-lg w-100">
              Entrar no Sistema
            </button>
          </form>
          <div class="text-center mt-4 text-muted small">
            <strong>Teste:</strong> login <code>admin</code> • senha
            <code>123456</code>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div id="mainScreen" class="d-none container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-info mb-0">Cadastro de Asset</h2>
        <button class="btn btn-primary" onclick="gerarRelatorioPDF()">
          <i class="fas fa-file-pdf me-2"></i> Gerar PDF
        </button>
      </div>

      <div class="card">
        <div class="card-body">
          <form id="assetForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Código</label>
                <input type="text" id="assetCodigo" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Nome do Produto</label>
                <input type="text" id="assetNome" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Asset</label>
                <input type="text" id="assetTipo" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">SN</label>
                <input type="text" id="assetSN" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Nº do Asset</label>
                <input type="text" id="assetNumero" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Imagem do Produto</label>
                <input type="file" id="assetImagem" class="form-control" accept="image/*" />
              </div>

              <div class="col-12">
                <div class="text-center">
                  <img
                    id="assetPreview"
                    class="preview-img border shadow"
                    src="https://via.placeholder.com/240x240?text=Sem+Imagem"
                    alt="Preview"
                  />
                </div>
              </div>

              <div class="col-12 text-center mt-4">
                <button type="button" onclick="salvarAsset()" class="btn btn-success btn-lg px-5 me-2">
                  <i class="fas fa-save me-2"></i> Salvar no Banco
                </button>
                <button type="button" onclick="gerarRelatorioPDF()" class="btn btn-primary btn-lg px-5">
                  <i class="fas fa-file-pdf me-2"></i> Gerar PDF
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="acesso.js"></script>
    <script type="module">
      import { DB } from './bd.js';

      let currentAssetImage = "";

      document.getElementById("assetImagem").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          currentAssetImage = event.target.result;
          document.getElementById("assetPreview").src = currentAssetImage;
        };
        reader.readAsDataURL(file);
      });

      async function salvarAsset() {
        const codigo = document.getElementById("assetCodigo").value.trim();
        const nome = document.getElementById("assetNome").value.trim();
        const tipo = document.getElementById("assetTipo").value.trim();
        const sn = document.getElementById("assetSN").value.trim();
        const numero = document.getElementById("assetNumero").value.trim();

        if (!codigo || !nome || !tipo || !sn || !numero) {
          alert("Preencha todos os campos antes de salvar.");
          return;
        }

        const asset = {
          codigo,
          nome,
          tipo,
          sn,
          numero,
          imagem: currentAssetImage,
          criadoEm: new Date().toLocaleString("pt-BR"),
        };

        await DB.addItem('assets', asset);
        alert('Asset salvo com sucesso no banco de dados.');
      }

      function gerarRelatorioPDF(data) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "pt", format: "a4" });
        const now = new Date();

        const payload = data || {
          codigo: document.getElementById("assetCodigo").value.trim(),
          nome: document.getElementById("assetNome").value.trim(),
          tipo: document.getElementById("assetTipo").value.trim(),
          sn: document.getElementById("assetSN").value.trim(),
          numero: document.getElementById("assetNumero").value.trim(),
          imagem: currentAssetImage,
        };

        doc.setFontSize(18);
        doc.text("Relatório de Asset", 40, 50);
        doc.setFontSize(10);
        doc.text(`Gerado em: ${now.toLocaleString("pt-BR")}`, 40, 70);

        const rows = [
          ["Código", payload.codigo || ""],
          ["Nome do Produto", payload.nome || ""],
          ["Asset", payload.tipo || ""],
          ["SN", payload.sn || ""],
          ["Nº do Asset", payload.numero || ""],
        ];

        doc.autoTable({
          startY: 90,
          body: rows,
          theme: "grid",
          styles: { fontSize: 11, cellPadding: 6 },
          margin: { left: 40, right: 40 },
        });

        if (payload.imagem) {
          const imgWidth = 140;
          const imgHeight = 140;
          doc.addImage(payload.imagem, "JPEG", 40, 250, imgWidth, imgHeight);
        }

        doc.save(`asset_${payload.codigo || "sem_codigo"}_${now.toISOString().slice(0, 10)}.pdf`);
      }

      window.addEventListener("load", () => {
        access.initAccess({
          mainScreenId: "mainScreen",
          navbarId: "navbar",
          userNameId: "userName",
          userDisplayName: "Usuário",
          validLogin: "admin",
          validSenha: "123456",
        });
      });
    </script>
  </body>
</html>
